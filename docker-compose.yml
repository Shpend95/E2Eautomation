services:
  selenium-hub:
    image: selenium/hub:latest
    # only expose UI port
    ports:
      - "4444:4444"   # only UI
    networks:
      - dockernet

  chrome-node:
    image: selenium/node-chrome:latest
    shm_size: 2g
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    networks:
      - dockernet

  firefox-node:
    image: selenium/node-firefox:latest
    shm_size: 2g
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    networks:
      - dockernet

networks:
  dockernet:
    driver: bridge

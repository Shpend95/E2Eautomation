# BROWSER
browser=chrome
headless=false

# ENV Options: local, grid, docker-grid, cloud
environment=docker-grid
appUrl=http://localhost:3000

# Local Grid Hub URL with /wd/hub is the RemoteWebDriver endpoint my automation connects to.
seleniumHub=http://localhost:4444/wd/hub

# Docker Grid (containerized Selenium Grid on your machine)  Your app, not the grid!
dockerGridUrl=http://localhost:3000

# Cloud deployment (AWS EC2 or similar)
cloudUrl=http://3.86.71.8:8081

# Docker Grid Hub (containerized grid)
dockerSeleniumHub=http://localhost:4444/wd/hub

# Cloud Grid Hub (if grid is also in cloud)
cloudSeleniumHub=http://3.86.71.8:4444/wd/hub


# SeleniumGrid URL without /wd/hub is just the Grid UI for monitoring and isn't used in code.
gridUrl=http://localhost:4444


# NOTES FOR QA TEAM
# ========================================
# LOCAL: Tests run on your machine with local browser drivers
# GRID: Tests run on local Selenium Grid (multiple browsers/versions)
# DOCKER-GRID: Tests run on Docker containers (isolated environments)
# CLOUD: Tests run against cloud-deployed application (CI/CD pipeline)3.86.71.8:3000/